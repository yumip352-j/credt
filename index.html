<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>자산 관리</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;600&family=DM+Mono:wght@300;400;500&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f2ed;
    --bg2: #eee9e1;
    --surface: #faf8f4;
    --border: #d8d0c4;
    --border-light: #e8e2d8;
    --text: #2a2420;
    --text-sub: #7a6f66;
    --text-muted: #a89f96;
    --deposit: #4a6741;
    --deposit-light: #e8f0e6;
    --deposit-mid: #c5d9c2;
    --stock: #3d5a7a;
    --stock-light: #e4ecf4;
    --stock-mid: #b8cfe0;
    --accent: #c17f3a;
    --accent-light: #f5ead8;
    --danger: #a04040;
    --danger-light: #f5e4e4;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Serif KR', serif;
    font-weight: 300;
    min-height: 100vh;
    padding: 0 0 80px;
  }

  /* ── HEADER ── */
  header {
    background: var(--text);
    color: var(--bg);
    padding: 28px 40px 22px;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 20px;
  }
  header h1 {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-size: 2rem;
    letter-spacing: 0.04em;
    line-height: 1;
  }
  header h1 span { font-style: italic; color: #c9b99a; }
  .header-total {
    text-align: right;
  }
  .header-total .label {
    font-size: 0.65rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: #9a8f82;
    margin-bottom: 2px;
  }
  .header-total .amount {
    font-family: 'DM Mono', monospace;
    font-size: 1.35rem;
    font-weight: 400;
    letter-spacing: -0.01em;
  }

  /* ── BANK BAR ── */
  #bankBar { scrollbar-width: none; }
  #bankBar::-webkit-scrollbar { display: none; }
  .bank-chip {
    display: flex;
    flex-direction: column;
    padding: 4px 20px 4px 0;
    margin-right: 20px;
    border-right: 1px solid #3a342e;
    gap: 2px;
    flex-shrink: 0;
  }
  .bank-chip:last-child { border-right: none; }
  .bank-chip .b-name {
    font-size: 0.58rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #7a6f66;
  }
  .bank-chip .b-amt {
    font-family: 'DM Mono', monospace;
    font-size: 0.82rem;
    color: #c9b99a;
    font-weight: 400;
  }

  /* ── SUMMARY BAR ── */
  .summary-bar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 18px 40px;
    display: flex;
    gap: 40px;
    align-items: center;
  }
  .sum-item { display: flex; flex-direction: column; gap: 3px; }
  .sum-item .s-label {
    font-size: 0.6rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--text-muted);
  }
  .sum-item .s-val {
    font-family: 'DM Mono', monospace;
    font-size: 0.95rem;
    font-weight: 500;
  }
  .sum-item.deposit .s-val { color: var(--deposit); }
  .sum-item.stock .s-val { color: var(--stock); }
  .sum-item.interest .s-val { color: var(--accent); }
  .sum-divider {
    width: 1px; height: 36px; background: var(--border); flex-shrink: 0;
  }

  /* ── MAIN ── */
  main { padding: 36px 40px; display: grid; grid-template-columns: 1fr 1fr; gap: 32px; }

  /* ── SECTION CARD ── */
  .section-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 2px;
    overflow: hidden;
  }
  .section-header {
    padding: 18px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border-light);
  }
  .section-title {
    display: flex; align-items: center; gap: 10px;
  }
  .sec-dot {
    width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
  }
  .deposit-card .sec-dot { background: var(--deposit); }
  .stock-card .sec-dot { background: var(--stock); }
  .section-title h2 {
    font-size: 0.8rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    font-weight: 600;
  }
  .section-total {
    font-family: 'DM Mono', monospace;
    font-size: 0.85rem;
    color: var(--text-sub);
  }

  /* ── ADD BTN ── */
  .btn-add {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-sub);
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    letter-spacing: 0.08em;
    padding: 6px 14px;
    cursor: pointer;
    border-radius: 2px;
    transition: all 0.15s;
  }
  .btn-add:hover {
    border-color: var(--text);
    color: var(--text);
    background: var(--bg2);
  }
  .deposit-card .btn-add:hover { border-color: var(--deposit); color: var(--deposit); }
  .stock-card .btn-add:hover { border-color: var(--stock); color: var(--stock); }

  /* ── ITEMS LIST ── */
  .items-list { padding: 8px 0; }

  /* ── DEPOSIT ITEM ── */
  .deposit-item {
    border-bottom: 1px solid var(--border-light);
    overflow: hidden;
  }
  .deposit-item:last-child { border-bottom: none; }

  .deposit-summary {
    padding: 14px 24px;
    display: grid;
    grid-template-columns: 1fr auto auto;
    align-items: center;
    gap: 16px;
    cursor: pointer;
    transition: background 0.12s;
    user-select: none;
  }
  .deposit-summary:hover { background: var(--bg2); }
  .deposit-summary.active { background: var(--deposit-light); }

  .dep-name {
    font-size: 0.85rem;
    font-weight: 400;
  }
  .dep-bank {
    font-size: 0.68rem;
    color: var(--text-muted);
    margin-top: 2px;
    letter-spacing: 0.04em;
  }
  .dep-amount {
    font-family: 'DM Mono', monospace;
    font-size: 0.88rem;
    text-align: right;
    white-space: nowrap;
  }
  .dep-chevron {
    color: var(--text-muted);
    font-size: 0.7rem;
    transition: transform 0.2s;
    width: 14px;
    text-align: center;
  }
  .deposit-summary.active .dep-chevron { transform: rotate(180deg); }

  /* ── DEPOSIT DETAIL ── */
  .deposit-detail {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.3s ease;
    background: var(--deposit-light);
    border-top: 0px solid transparent;
  }
  .deposit-detail.open {
    max-height: 400px;
    border-top: 1px solid var(--deposit-mid);
  }
  .detail-inner {
    padding: 16px 24px 20px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px 20px;
  }
  .detail-field { display: flex; flex-direction: column; gap: 4px; }
  .detail-field label {
    font-size: 0.62rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--deposit);
    opacity: 0.7;
  }
  .detail-field input, .detail-field select {
    background: var(--surface);
    border: 1px solid var(--deposit-mid);
    border-radius: 2px;
    padding: 7px 10px;
    font-family: 'DM Mono', monospace;
    font-size: 0.8rem;
    color: var(--text);
    outline: none;
    width: 100%;
    transition: border-color 0.15s;
  }
  .detail-field input:focus {
    border-color: var(--deposit);
  }
  .detail-field.full { grid-column: 1 / -1; }

  .detail-actions {
    padding: 0 24px 16px;
    display: flex;
    gap: 8px;
    justify-content: flex-end;
    background: var(--deposit-light);
  }
  .btn-save {
    background: var(--deposit);
    color: white;
    border: none;
    padding: 7px 18px;
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    letter-spacing: 0.06em;
    cursor: pointer;
    border-radius: 2px;
    transition: opacity 0.15s;
  }
  .btn-save:hover { opacity: 0.85; }
  .btn-mature {
    background: var(--accent);
    color: white;
    border: none;
    padding: 7px 18px;
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    letter-spacing: 0.06em;
    cursor: pointer;
    border-radius: 2px;
    transition: opacity 0.15s;
  }
  .btn-mature:hover { opacity: 0.85; }
  .btn-delete {
    background: none;
    border: 1px solid var(--border);
    color: var(--danger);
    padding: 7px 14px;
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    cursor: pointer;
    border-radius: 2px;
    transition: all 0.15s;
    margin-right: auto;
  }
  .btn-delete:hover { background: var(--danger-light); border-color: var(--danger); }

  /* status badges */
  .dep-status {
    font-size: 0.6rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 2px 7px;
    border-radius: 20px;
    font-family: 'DM Mono', monospace;
  }
  .status-active { background: var(--deposit-light); color: var(--deposit); }
  .status-mature { background: var(--accent-light); color: var(--accent); }
  .status-expired { background: var(--danger-light); color: var(--danger); }

  /* ── STOCK ITEM ── */
  .stock-item {
    padding: 14px 24px;
    border-bottom: 1px solid var(--border-light);
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 12px;
    align-items: start;
  }
  .stock-item:last-child { border-bottom: none; }
  .stock-name { font-size: 0.85rem; font-weight: 400; }
  .stock-type {
    font-size: 0.64rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--stock);
    opacity: 0.7;
    margin-top: 2px;
  }
  .stock-entries { margin-top: 8px; display: flex; flex-direction: column; gap: 4px; }
  .stock-entry {
    display: flex;
    gap: 10px;
    align-items: center;
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    color: var(--text-sub);
  }
  .stock-entry .entry-date { color: var(--text-muted); min-width: 80px; }
  .stock-entry .entry-amt { color: var(--text); font-weight: 500; }
  .stock-total {
    text-align: right;
  }
  .stock-total .t-label {
    font-size: 0.6rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 3px;
  }
  .stock-total .t-amt {
    font-family: 'DM Mono', monospace;
    font-size: 0.92rem;
    color: var(--stock);
    font-weight: 500;
  }

  /* stock add form inside card */
  .stock-add-form {
    padding: 14px 24px;
    background: var(--stock-light);
    border-top: 1px solid var(--stock-mid);
    display: none;
    flex-direction: column;
    gap: 12px;
  }
  .stock-add-form.open { display: flex; }
  .stock-form-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
  .stock-form-row .detail-field input,
  .stock-form-row .detail-field select {
    border-color: var(--stock-mid);
  }
  .stock-form-row .detail-field input:focus {
    border-color: var(--stock);
  }
  .btn-save-stock {
    background: var(--stock);
    color: white;
    border: none;
    padding: 7px 18px;
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    letter-spacing: 0.06em;
    cursor: pointer;
    border-radius: 2px;
    align-self: flex-end;
    transition: opacity 0.15s;
  }
  .btn-save-stock:hover { opacity: 0.85; }

  /* entry delete btn */
  .btn-del-entry {
    background: none;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    font-size: 0.75rem;
    padding: 0 3px;
    line-height: 1;
    transition: color 0.1s;
  }
  .btn-del-entry:hover { color: var(--danger); }

  /* ── INTEREST SUMMARY BOX ── */
  .interest-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 2px;
    padding: 22px 28px;
  }
  .interest-box h3 {
    font-size: 0.7rem;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 16px;
  }
  .interest-rows {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .interest-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 14px;
    background: var(--bg2);
    border-radius: 2px;
    gap: 16px;
  }
  .ir-name { font-size: 0.82rem; }
  .ir-detail { font-size: 0.68rem; color: var(--text-muted); margin-top: 2px; font-family: 'DM Mono', monospace; }
  .ir-interest { font-family: 'DM Mono', monospace; font-size: 0.88rem; color: var(--accent); font-weight: 500; }
  .ir-after { font-size: 0.75rem; color: var(--accent); opacity: 0.75; font-weight: 400; }
  .ir-maturity { font-family: 'DM Mono', monospace; font-size: 0.75rem; color: var(--text-sub); margin-top: 2px; }
  .interest-total-row {
    margin-top: 8px;
    padding: 10px 14px;
    background: var(--accent-light);
    border-radius: 2px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border: 1px solid #e8d4b8;
  }
  .interest-total-row .label { font-size: 0.72rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--accent); }
  .interest-total-row .val { font-family: 'DM Mono', monospace; font-size: 1.05rem; color: var(--accent); font-weight: 500; }

  /* modal */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(42,36,32,0.45);
    z-index: 100;
    align-items: center;
    justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 2px;
    padding: 28px 32px;
    width: min(480px, 90vw);
    box-shadow: 0 20px 60px rgba(0,0,0,0.15);
  }
  .modal h3 {
    font-size: 0.78rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    margin-bottom: 20px;
    color: var(--text-sub);
  }
  .modal-form { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .modal-form .full { grid-column: 1 / -1; }
  .modal-form label {
    font-size: 0.62rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-muted);
    display: block;
    margin-bottom: 5px;
  }
  .modal-form input, .modal-form select {
    width: 100%;
    min-width: 0;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 2px;
    padding: 9px 12px;
    font-family: 'DM Mono', monospace;
    font-size: 0.82rem;
    color: var(--text);
    outline: none;
    transition: border-color 0.15s;
  }
  .modal-form input:focus { border-color: var(--deposit); }
  .modal-actions {
    display: flex;
    justify-content: flex-end;
    gap: 10px;
    margin-top: 22px;
  }
  .btn-cancel {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-sub);
    padding: 8px 18px;
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    cursor: pointer;
    border-radius: 2px;
  }
  .btn-cancel:hover { background: var(--bg2); }
  .btn-confirm {
    background: var(--deposit);
    color: white;
    border: none;
    padding: 8px 20px;
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    letter-spacing: 0.06em;
    cursor: pointer;
    border-radius: 2px;
  }
  .btn-confirm.stock-btn { background: var(--stock); }

  /* empty state */
  .empty-state {
    padding: 32px 24px;
    text-align: center;
    color: var(--text-muted);
    font-size: 0.78rem;
    letter-spacing: 0.06em;
  }

  /* matured overlay */
  .dep-matured .dep-name { text-decoration: line-through; opacity: 0.6; }

  /* income grid */
  .income-month-row {
    display: grid;
    grid-template-columns: 40px 1fr 1fr 1fr 76px;
    gap: 8px;
    align-items: center;
    padding: 7px 0;
    border-bottom: 1px solid var(--border-light);
  }
  .income-month-row:last-child { border-bottom: none; }
  .income-month-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    color: var(--text-muted);
  }
  .income-input {
    background: var(--bg2);
    border: 1px solid var(--border-light);
    border-radius: 2px;
    padding: 5px 8px;
    font-family: 'DM Mono', monospace;
    font-size: 0.78rem;
    color: var(--text);
    outline: none;
    width: 100%;
    transition: border-color 0.12s;
    text-align: right;
  }
  .income-input:focus { border-color: #7a6a8a; }
  .income-row-total {
    font-family: 'DM Mono', monospace;
    font-size: 0.78rem;
    color: #7a6a8a;
    font-weight: 500;
    text-align: right;
  }
  .income-header-row {
    display: grid;
    grid-template-columns: 40px 1fr 1fr 1fr 76px;
    gap: 8px;
    padding: 0 0 8px;
    border-bottom: 2px solid var(--border);
    margin-bottom: 4px;
  }
  .income-header-row span {
    font-size: 0.62rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-muted);
    text-align: right;
  }
  .income-header-row span:first-child { text-align: left; }

  /* period buttons */
  .period-btn {
    background: var(--bg2);
    white-space: nowrap;
    width: auto !important;
    flex-shrink: 0;
    border: 1px solid var(--border);
    color: var(--text-sub);
    font-family: 'DM Mono', monospace;
    font-size: 0.68rem;
    padding: 4px 0;
    cursor: pointer;
    border-radius: 2px;
    transition: all 0.12s;
  }
  .period-btn:hover { border-color: var(--deposit); color: var(--deposit); background: var(--deposit-light); }
  .period-btn.active { background: var(--deposit); color: #fff; border-color: var(--deposit); }

  /* yesugeum header */
  .header-yesugeum .label {
    font-size: 0.65rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: #9a8f82;
    margin-bottom: 2px;
  }
  .header-yesugeum .amount {
    font-family: 'DM Mono', monospace;
    font-size: 1.05rem;
    font-weight: 400;
  }

  /* transfer button */
  .btn-transfer {
    background: none;
    border: 1px solid var(--stock-mid);
    color: var(--stock);
    font-family: 'DM Mono', monospace;
    font-size: 0.68rem;
    letter-spacing: 0.06em;
    padding: 5px 12px;
    cursor: pointer;
    border-radius: 2px;
    transition: all 0.15s;
  }
  .btn-transfer:hover { background: var(--stock-light); border-color: var(--stock); }

  /* entry styles */
  .entry-note {
    font-size: 0.65rem;
    color: var(--text-muted);
    font-style: italic;
  }
  .amt-neg { color: var(--danger) !important; }
  .entry-out { opacity: 0.75; }

  @media (max-width: 768px) {
    header { padding: 20px; flex-direction: column; align-items: flex-start; }
    .summary-bar { padding: 14px 20px; gap: 20px; flex-wrap: wrap; }
    main { padding: 20px; grid-template-columns: 1fr; gap: 20px; }

    .section-card[style*='grid-row:1/3'] { grid-row: auto; }
    .modal-form { grid-template-columns: 1fr; }
    .modal-form .full { grid-column: 1; }
    .stock-form-row { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <h1>자산 <span>관리</span></h1>
  <div style="display:flex;gap:32px;align-items:flex-end;">
    <div class="header-yesugeum">
      <div class="label">예수금</div>
      <div class="amount" id="yesugeumAmt" style="color:#c9b99a;cursor:pointer;" onclick="openYesugeumModal()" title="예수금 관리">—</div>
    </div>
    <div class="header-total">
      <div class="label">총 자산</div>
      <div class="amount" id="totalAsset">—</div>
    </div>
  </div>
</header>

<!-- BANK BAR -->
<div id="bankBar" style="background:var(--text);border-top:1px solid #3a342e;padding:10px 40px;display:flex;gap:0;overflow-x:auto;flex-wrap:wrap;"></div>

<!-- SUMMARY BAR -->
<div class="summary-bar">
  <div class="sum-item deposit">
    <div class="s-label">예금 합계</div>
    <div class="s-val" id="sumDeposit">—</div>
  </div>
  <div class="sum-divider"></div>
  <div class="sum-item stock">
    <div class="s-label">주식 투자금</div>
    <div class="s-val" id="sumStock">—</div>
  </div>
  <div class="sum-divider"></div>
  <div class="sum-item interest">
    <div class="s-label">연간 이자 (세전)</div>
    <div class="s-val" id="sumInterest">—</div>
  </div>
  <div class="sum-divider"></div>
  <div class="sum-item" style="cursor:pointer;" onclick="openYesugeumModal()">

      </div>

        <input type="number" id="s-amount" placeholder="10000000" />
      </div>

<script>
// ── STATE ──
let deposits = JSON.parse(localStorage.getItem('deposits') || '[]');
let stocks = JSON.parse(localStorage.getItem('stocks') || '[]');
let yesugeum = JSON.parse(localStorage.getItem('yesugeum') || '[]');
let income = JSON.parse(localStorage.getItem('income') || '{}'); // {YYYY-MM: {salary, side, extra}} // [{id,date,amount,note}]
let openDepositId = null;
let editingStockId = null;

// 첫 방문 시 빈 상태로 시작
if (!localStorage.getItem('initialized_v3')) {
  localStorage.removeItem('initialized');
  localStorage.removeItem('initialized_v2');
  save();
  localStorage.setItem('initialized_v3', '1');
}

// ── TRANSFER ──
let transferFrom = null;
function openTransfer(fromId) {
  transferFrom = fromId;
  const from = stocks.find(s => s.id === fromId);
  const fromTotal = (from.entries || []).reduce((a, e) => a + e.amount, 0);
  document.getElementById('tf-from-name').textContent = from.name;
  document.getElementById('tf-from-bal').textContent = fmt(fromTotal);
  document.getElementById('tf-amount').value = '';
  document.getElementById('tf-date').value = new Date().toISOString().slice(0,10);
  const sel = document.getElementById('tf-to');
  sel.innerHTML = stocks.filter(s => s.id !== fromId).map(s =>
    '<option value="' + s.id + '">' + s.name + '</option>'
  ).join('') + '<option value="__yesugeum__">예수금</option>';
  document.getElementById('transferModal').classList.add('open');
}
function closeTransfer() {
  document.getElementById('transferModal').classList.remove('open');
}
// ── YESUGEUM ──
function depSendToYg(depId) {
  const d = deposits.find(x => x.id === depId);
  if (!d || !d.amount) return;
  if (!confirm(d.name + ' ₩' + d.amount.toLocaleString() + '을 예수금으로 이체하시겠습니까?')) return;
  const date = new Date().toISOString().slice(0,10);
  yesugeum.push({ id: uid(), date, amount: d.amount, note: '← ' + d.name });
  save(); render();
}
function openYesugeumModal() {
  document.getElementById('yg-date').value = new Date().toISOString().slice(0,10);
  document.getElementById('yg-amount').value = '';
  document.getElementById('yg-note').value = '';
  renderYgList();
  updateYgBal();
  document.getElementById('yesugeumModal').classList.add('open');
}
function closeYesugeumModal() {
  document.getElementById('yesugeumModal').classList.remove('open');
}
function updateYgBal() {
  const total = yesugeum.reduce((a, e) => a + e.amount, 0);
  document.getElementById('yg-bal').textContent = fmt(total);
}
function addYesugeum(sign) {
  const amount = +document.getElementById('yg-amount').value;
  const date = document.getElementById('yg-date').value;
  const note = document.getElementById('yg-note').value.trim();
  if (!amount) { alert('금액을 입력하세요'); return; }
  yesugeum.push({ id: uid(), date, amount: amount * sign, note });
  document.getElementById('yg-amount').value = '';
  document.getElementById('yg-note').value = '';
  save(); render();
  renderYgList(); updateYgBal();
}
function deleteYgEntry(id) {
  yesugeum = yesugeum.filter(e => e.id !== id);
  save(); render();
  renderYgList(); updateYgBal();
}
function renderYgList() {
  const el = document.getElementById('yg-list');
  if (!yesugeum.length) {
    el.innerHTML = '<div class="empty-state">내역 없음</div>';
    return;
  }
  const sorted = [...yesugeum].reverse();
  el.innerHTML = sorted.map(e => `
    <div style="display:flex;justify-content:space-between;align-items:center;padding:9px 14px;border-bottom:1px solid var(--border-light);">
      <div>
        <span style="font-family:'DM Mono',monospace;font-size:0.72rem;color:var(--text-muted);margin-right:10px;">${e.date}</span>
        <span style="font-size:0.78rem;color:var(--text-sub);">${e.note || ''}</span>
      </div>
      <div style="display:flex;align-items:center;gap:10px;">
        <span style="font-family:'DM Mono',monospace;font-size:0.85rem;font-weight:500;color:${e.amount >= 0 ? 'var(--deposit)' : 'var(--danger)'};">${e.amount >= 0 ? '+' : ''}${fmt(e.amount)}</span>
        <button class="btn-del-entry" onclick="deleteYgEntry('${e.id}')">×</button>
      </div>
    </div>`).join('');
}
function depositToYesugeum(depId) {
  const d = deposits.find(x => x.id === depId);
  if (!d) return;
  const date = new Date().toISOString().slice(0,10);
  yesugeum.push({ id: uid(), date, amount: d.amount, note: '← ' + d.name + ' 만기' });
  save(); render();
}

function execTransfer() {
  const toId = document.getElementById('tf-to').value;
  const amount = +document.getElementById('tf-amount').value;
  const date = document.getElementById('tf-date').value;
  if (!amount || amount <= 0) { alert('금액을 입력하세요'); return; }
  const from = stocks.find(s => s.id === transferFrom);
  const to = stocks.find(s => s.id === toId);
  if (!from || !to) return;
  if (toId === '__yesugeum__') {
    from.entries.push({ id: uid(), date, amount: -amount, note: '→ 예수금' });
    yesugeum.push({ id: uid(), date, amount, note: '← ' + from.name });
  } else {
    from.entries.push({ id: uid(), date, amount: -amount, note: '→ ' + to.name });
    to.entries.push({ id: uid(), date, amount, note: '← ' + from.name });
  }
  save(); render(); closeTransfer();
}

function uid() {
  return Math.random().toString(36).slice(2, 10);
}

function save() {
  localStorage.setItem('deposits', JSON.stringify(deposits));
  localStorage.setItem('stocks', JSON.stringify(stocks));
  localStorage.setItem('yesugeum', JSON.stringify(yesugeum));
  localStorage.setItem('income', JSON.stringify(income));
}

function fmt(n) {
  if (!n && n !== 0) return '—';
  return '₩' + Math.round(n).toLocaleString('ko-KR');
}

function fmtRate(r) {
  return r ? r.toFixed(2) + '%' : '';
}

// ── INTEREST CALC ──
function calcAnnualInterest(d) {
  if (!d.amount || !d.rate || !d.start || !d.end) return 0;
  const s = new Date(d.start);
  const e = new Date(d.end);
  const days = (e - s) / 86400000;
  if (days <= 0) return 0;
  const years = days / 365;
  return d.amount * (d.rate / 100) * years;
}

// ── RENDER ──
function render() {
  renderDeposits();
  renderStocks();
  renderSummary();
  renderInterest();
  renderIncome();
}

function renderDeposits() {
  const list = document.getElementById('depositList');
  if (!deposits.length) {
    list.innerHTML = '<div class="empty-state">예금 항목이 없습니다</div>';
    return;
  }
  const sorted = [...deposits].sort((a, b) => {
    if (!a.end && !b.end) return 0;
    if (!a.end) return 1;
    if (!b.end) return -1;
    return a.end.localeCompare(b.end);
  });
  list.innerHTML = sorted.map(d => {
    const isOpen = openDepositId === d.id;
    const interest = calcAnnualInterest(d);
    const today = new Date();
    const end = d.end ? new Date(d.end) : null;
    let statusClass = 'status-active';
    let statusLabel = '운용중';
    if (d.matured) { statusClass = 'status-mature'; statusLabel = '만기완료'; }
    else if (end && end < today) { statusClass = 'status-expired'; statusLabel = '만기경과'; }

    return `
    <div class="deposit-item ${d.matured ? 'dep-matured' : ''}">
      <div class="deposit-summary ${isOpen ? 'active' : ''}" onclick="toggleDeposit('${d.id}')">
        <div>
          <div class="dep-name">${d.name} <span class="dep-status ${statusClass}">${statusLabel}</span></div>
          <div class="dep-bank">${d.bank || ''} ${d.rate ? '· ' + fmtRate(d.rate) : ''} ${d.end ? '· ' + d.end + ' 만기' : ''}</div>
        </div>
        <div class="dep-amount">${fmt(d.amount)}</div>
        <div class="dep-chevron">▾</div>
      </div>
      <div class="deposit-detail ${isOpen ? 'open' : ''}">
        <div class="detail-inner">
          <div class="detail-field">
            <label>예금 이름</label>
            <input type="text" value="${d.name}" onchange="updateDeposit('${d.id}','name',this.value)" />
          </div>
          <div class="detail-field">
            <label>은행</label>
            <input type="text" value="${d.bank || ''}" onchange="updateDeposit('${d.id}','bank',this.value)" />
          </div>
          <div class="detail-field">
            <label>금액 (원)</label>
            <input type="number" value="${d.amount || ''}" onchange="updateDeposit('${d.id}','amount',+this.value)" />
          </div>
          <div class="detail-field">
            <label>연이율 (%)</label>
            <input type="number" step="0.01" value="${d.rate || ''}" onchange="updateDeposit('${d.id}','rate',+this.value)" />
          </div>
          <div class="detail-field">
            <label>가입일</label>
            <input type="date" value="${d.start || ''}" onchange="updateDeposit('${d.id}','start',this.value)" />
          </div>
          <div class="detail-field">
            <label>만기일</label>
            <input type="date" value="${d.end || ''}" onchange="updateDeposit('${d.id}','end',this.value)" />
          </div>
          <div class="detail-field full">
            <label>이자 지급 방식</label>
            <select onchange="updateDeposit('${d.id}','paytype',this.value)">
              <option value="maturity" ${d.paytype === 'maturity' ? 'selected' : ''}>만기일시지급</option>
              <option value="monthly" ${d.paytype === 'monthly' ? 'selected' : ''}>월이자지급</option>
              <option value="quarterly" ${d.paytype === 'quarterly' ? 'selected' : ''}>분기이자지급</option>
            </select>
          </div>
        </div>
        <div class="detail-actions">
          <button class="btn-delete" onclick="deleteDeposit('${d.id}')">삭제</button>
          <button class="btn-mature" onclick="toggleMature('${d.id}')">${d.matured ? '활성화' : '만기 처리'}</button>
          <button class="btn-save" onclick="saveDepositInline('${d.id}')">저장</button>
          <button class="btn-mature" style="background:var(--accent);font-size:0.68rem;" onclick="depSendToYg('${d.id}')">→ 예수금</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

function renderStocks() {
  const list = document.getElementById('stockList');
  if (!stocks.length) {
    list.innerHTML = '<div class="empty-state">주식/ETF 항목이 없습니다</div>';
    return;
  }
  list.innerHTML = stocks.map(s => {
    const isEditing = editingStockId;
    // 연도별 매수/매도 집계
    const byYear = {};
    (s.entries || []).forEach(e => {
      if (!e.date) return;
      const yr = e.date.slice(0,4);
      if (!byYear[yr]) byYear[yr] = { buy: 0, sell: 0, transfer_in: 0, transfer_out: 0 };
      const isTransferIn  = e.amount > 0 && e.note && e.note.startsWith('←');
      const isTransferOut = e.amount < 0 && e.note && e.note.startsWith('→');
      if (isTransferIn)       byYear[yr].transfer_in  += e.amount;
      else if (isTransferOut) byYear[yr].transfer_out += Math.abs(e.amount);
      else if (e.amount > 0)  byYear[yr].buy += e.amount;
      else                    byYear[yr].sell += Math.abs(e.amount);
    });
    const years = Object.keys(byYear).sort().reverse();
    return `
    <div>
      <div class="stock-item">
        <div style="width:100%;">
          <div style="display:flex;justify-content:space-between;align-items:flex-start;">
            <div>
              <div class="stock-name">${s.name}</div>
              <div class="stock-type">${s.type}</div>
            </div>
            <button class="btn-delete" style="font-size:0.66rem;margin-top:2px;" onclick="deleteStock('${s.id}')">계좌 삭제</button>
          </div>
          <!-- 연도별 요약 -->
          <div style="margin-top:10px;display:flex;flex-direction:column;gap:4px;">
            ${years.length ? years.map(yr => `
              <div style="display:flex;align-items:center;gap:16px;font-family:'DM Mono',monospace;font-size:0.78rem;">
                <span style="color:var(--text-muted);min-width:36px;">${yr}</span>
                ${byYear[yr].buy ? `<span style="color:var(--stock);">매수 ${fmt(byYear[yr].buy)}</span>` : ''}
                ${byYear[yr].sell ? `<span style="color:var(--danger);">매도 ${fmt(byYear[yr].sell)}</span>` : ''}
                ${byYear[yr].transfer_in ? `<span style="color:var(--text-muted);">이체입금 ${fmt(byYear[yr].transfer_in)}</span>` : ''}
                ${byYear[yr].transfer_out ? `<span style="color:var(--text-muted);">이체출금 ${fmt(byYear[yr].transfer_out)}</span>` : ''}
              </div>`).join('') : '<div style="font-size:0.75rem;color:var(--text-muted);">내역 없음</div>'}
          </div>
          <!-- 개별 내역 -->
          <div class="stock-entries" style="margin-top:8px;">
            ${(s.entries || []).map(e => `
              <div class="stock-entry ${e.amount < 0 ? 'entry-out' : ''}">
                <span class="entry-date">${e.date}</span>
                <span class="entry-amt ${e.amount < 0 ? 'amt-neg' : ''}">${e.amount < 0 ? '▼' : '▲'} ${fmt(Math.abs(e.amount))}</span>
                ${e.note ? `<span class="entry-note">${e.note}</span>` : ''}
                <button class="btn-del-entry" onclick="deleteStockEntry('${s.id}','${e.id}')" title="삭제">×</button>
              </div>
            `).join('')}
          </div>
          <div style="display:flex;gap:6px;margin-top:10px;flex-wrap:wrap;">
            <button class="btn-add" style="font-size:0.68rem;" onclick="toggleStockEntry('${s.id}')">+ 매수</button>
            <button class="btn-transfer" style="color:var(--danger);border-color:var(--danger);" onclick="toggleStockSell('${s.id}')">- 매도</button>
            <button class="btn-transfer" onclick="toggleStockEdit('${s.id}')">✎ 수정</button>
            ${stocks.length > 1 ? `<button class="btn-transfer" onclick="openTransfer('${s.id}')">⇄ 이체</button>` : ''}
          </div>
        </div>
      </div>
      <div class="stock-add-form ${isEditing === s.id + '_buy' ? 'open' : ''}" id="stock-form-${s.id}">
        <div class="stock-form-row">
          <div class="detail-field">
            <label>매수일</label>
            <input type="date" id="se-date-${s.id}" />
          </div>
          <div class="detail-field">
            <label>매수 금액 (원)</label>
            <input type="number" id="se-amt-${s.id}" placeholder="1000000" />
          </div>
        </div>
        <div style="display:flex;gap:8px;justify-content:flex-end;">
          <button class="btn-cancel" onclick="toggleStockEntry('${s.id}')">취소</button>
          <button class="btn-save-stock" onclick="addStockEntry('${s.id}', 1)">매수 추가</button>
        </div>
      </div>
      <div class="stock-add-form ${isEditing === s.id + '_sell' ? 'open' : ''}" id="stock-sell-form-${s.id}" style="background:var(--danger-light);border-top:1px solid #e0c0c0;">
        <div class="stock-form-row">
          <div class="detail-field">
            <label>매도일</label>
            <input type="date" id="ss-date-${s.id}" />
          </div>
          <div class="detail-field">
            <label>매도 금액 (원)</label>
            <input type="number" id="ss-amt-${s.id}" placeholder="1000000" />
          </div>
        </div>
        <div style="display:flex;gap:8px;justify-content:flex-end;">
          <button class="btn-cancel" onclick="toggleStockSell('${s.id}')">취소</button>
          <button class="btn-save-stock" style="background:var(--danger);" onclick="addStockEntry('${s.id}', -1)">매도 추가</button>
        </div>
      </div>
      <div class="stock-add-form" id="stock-edit-form-${s.id}" style="display:${isEditing === s.id + '_edit' ? 'flex' : 'none'};background:var(--bg2);border-top:1px solid var(--border);flex-direction:column;gap:10px;">
        <div style="font-size:0.62rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--text-muted);">계좌 정보 수정</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
          <div class="detail-field">
            <label>계좌명</label>
            <input type="text" id="se-name-${s.id}" value="${s.name}" style="background:var(--surface);border:1px solid var(--border);border-radius:2px;padding:7px 10px;font-family:'DM Mono',monospace;font-size:0.78rem;color:var(--text);outline:none;width:100%;" />
          </div>
          <div class="detail-field">
            <label>유형</label>
            <select id="se-type-${s.id}" style="background:var(--surface);border:1px solid var(--border);border-radius:2px;padding:7px 10px;font-family:'DM Mono',monospace;font-size:0.78rem;color:var(--text);outline:none;width:100%;">
              <option value="ETF" ${s.type==='ETF'?'selected':''}>ETF</option>
              <option value="주식" ${s.type==='주식'?'selected':''}>주식</option>
              <option value="ISA" ${s.type==='ISA'?'selected':''}>ISA</option>
              <option value="기타" ${s.type==='기타'?'selected':''}>기타</option>
            </select>
          </div>
        </div>
        <div style="display:flex;gap:8px;justify-content:flex-end;">
          <button class="btn-cancel" onclick="toggleStockEdit('${s.id}')">취소</button>
          <button class="btn-save-stock" onclick="saveStockEdit('${s.id}')">저장</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

function renderSummary() {
  const depTotal = deposits.filter(d => !d.matured).reduce((a, d) => a + (d.amount || 0), 0);
  const matTotal = deposits.filter(d => d.matured).reduce((a, d) => a + (d.amount || 0), 0);
  const stTotal = stocks.reduce((a, s) => a + (s.entries || []).filter(e => e.amount > 0).reduce((b, e) => b + e.amount, 0), 0);
  const totalInterest = deposits.reduce((a, d) => a + calcAnnualInterest(d), 0);

  const ygTotal = yesugeum.reduce((a, e) => a + e.amount, 0);
  document.getElementById('sumDeposit').textContent = fmt(depTotal + matTotal);
  document.getElementById('depositTotal').textContent = fmt(depTotal + matTotal);
  document.getElementById('sumStock').textContent = fmt(stTotal);
  document.getElementById('stockTotal').textContent = fmt(stTotal);
  document.getElementById('sumInterest').textContent = fmt(totalInterest);
  document.getElementById('sumYesugeum').textContent = fmt(ygTotal);

  // 은행별 합계
  const bankMap = {};
  deposits.forEach(d => {
    const bank = d.bank || '기타';
    bankMap[bank] = (bankMap[bank] || 0) + (d.amount || 0);
  });
  const bankBar = document.getElementById('bankBar');
  bankBar.innerHTML = Object.entries(bankMap)
    .sort((a,b) => b[1] - a[1])
    .map(([bank, amt]) => `
      <div class="bank-chip">
        <div class="b-name">${bank}</div>
        <div class="b-amt">${fmt(amt)}</div>
      </div>`).join('');
  document.getElementById('yesugeumAmt').textContent = fmt(ygTotal);
  document.getElementById('totalAsset').textContent = fmt(depTotal + matTotal + stTotal + ygTotal);

  // 올해 신규
  const thisYear = new Date().getFullYear().toString();

  const newStTotal = stocks.reduce((a, s) =>
    a + (s.entries || [])
      .filter(e => e.amount > 0 && e.date && e.date.startsWith(thisYear) && !e.note)
      .reduce((b, e) => b + e.amount, 0), 0);

  document.getElementById('sumNewStock').textContent = newStTotal ? fmt(newStTotal) : '—';

  // 올해 수입 총액
  const incomeTotal = Array.from({length:12}, (_,i) => String(i+1).padStart(2,'0'))
    .reduce((a, m) => {
      const d = income[`${thisYear}-${m}`] || {};
      return a + (d.salary||0) + (d.side||0) + (d.extra||0);
    }, 0);
  document.getElementById('sumIncomeTotal').textContent = incomeTotal ? fmt(incomeTotal) : '—';
}

function renderInterest() {
  const rows = document.getElementById('interestRows');
  const thisYear = new Date().getFullYear();
  const years = [thisYear, thisYear + 1];
  const nowY = thisYear;
  const nowM = new Date().getMonth() + 1;

  // 연도별 월별 집계 {year: {month: {before, after}}}
  const data = {};
  years.forEach(y => { data[y] = {}; });

  deposits.forEach(d => {
    if (!d.end || !d.amount || !d.rate || !d.start) return;
    const endDate = new Date(d.end);
    const y = endDate.getFullYear();
    const m = endDate.getMonth() + 1;
    if (!years.includes(y)) return;
    const before = calcAnnualInterest(d);
    const after = before * 0.846;
    if (!data[y][m]) data[y][m] = { before: 0, after: 0 };
    data[y][m].before += before;
    data[y][m].after += after;
  });

  let html = '';
  years.forEach(y => {
    const months = Object.entries(data[y]).sort((a,b) => +a[0] - +b[0]);
    const yearBefore = months.reduce((a,[,v]) => a + v.before, 0);
    const yearAfter  = months.reduce((a,[,v]) => a + v.after, 0);

    html += `<div style="margin-bottom:16px;">
      <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px;padding-bottom:6px;border-bottom:2px solid var(--border);">
        <span style="font-family:'DM Mono',monospace;font-size:0.75rem;font-weight:500;color:var(--text);">${y}년</span>
        <span style="font-family:'DM Mono',monospace;font-size:0.72rem;color:var(--text-muted);">
          세전 ${yearBefore ? fmt(Math.round(yearBefore)) : '—'} &nbsp;/&nbsp; 세후 ${yearAfter ? fmt(Math.round(yearAfter)) : '—'}
        </span>
      </div>`;

    if (!months.length) {
      html += `<div style="font-size:0.72rem;color:var(--text-muted);padding:4px 0;">이자 예정 없음</div>`;
    } else {
      months.forEach(([m, v]) => {
        const isCur = y === nowY && +m === nowM;
        const isPast = y === nowY && +m < nowM;
        html += `<div style="display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid var(--border-light);">
          <span style="font-family:'DM Mono',monospace;font-size:0.72rem;color:${isCur ? 'var(--accent)' : isPast ? 'var(--text-muted)' : 'var(--text-sub)'};">${m}월${isCur ? ' ◀' : ''}</span>
          <span style="font-family:'DM Mono',monospace;font-size:0.78rem;color:${isCur ? 'var(--accent)' : 'var(--deposit)'};">
            ${fmt(Math.round(v.before))} <span style="color:var(--text-muted);font-size:0.7rem;">/ ${fmt(Math.round(v.after))}</span>
          </span>
        </div>`;
      });
    }
    html += `</div>`;
  });

  rows.innerHTML = html;
  const total = Object.values(data[thisYear]).reduce((a,v) => a + v.after, 0);
  const el = document.getElementById('interestYearTotal');
  if (el) el.textContent = total ? fmt(Math.round(total)) + ' 세후' : '—';
}


// ── INCOME ──
function getIncomeYears() {
  const thisYear = new Date().getFullYear();
  const years = new Set([thisYear, thisYear - 1]);
  Object.keys(income).forEach(k => years.add(+k.slice(0,4)));
  return [...years].sort((a,b) => b - a);
}

function renderIncome() {
  const sel = document.getElementById('incomeYearSel');
  const years = getIncomeYears();
  const curVal = sel.value || new Date().getFullYear().toString();
  sel.innerHTML = years.map(y => `<option value="${y}" ${y == curVal ? 'selected' : ''}>${y}년</option>`).join('');
  const year = sel.value;

  let yearTotal = 0;
  const months = Array.from({length:12}, (_,i) => String(i+1).padStart(2,'0'));

  const grid = document.getElementById('incomeGrid');
  grid.innerHTML = `
    <div class="income-header-row">
      <span>월</span>
      <span>월급</span>
      <span>포타 (부업)</span>
      <span>기타수입</span>
      <span>합계</span>
    </div>` +
    months.map(m => {
      const key = `${year}-${m}`;
      const d = income[key] || {};
      const salary = d.salary || 0;
      const side = d.side || 0;
      const extra = d.extra || 0;
      const total = salary + side + extra;
      yearTotal += total;
      return `
      <div class="income-month-row">
        <div class="income-month-label">${+m}월</div>
        <input class="income-input" type="text" placeholder="0"
          value="${salary ? salary.toLocaleString('ko-KR') : ''}"
          onfocus="this.value=this.value.replace(/,/g,'')"
          onblur="formatIncomeInput(this);saveIncome('${key}','salary',parseNum(this.value))" />
        <input class="income-input" type="text" placeholder="0"
          value="${side ? side.toLocaleString('ko-KR') : ''}"
          onfocus="this.value=this.value.replace(/,/g,'')"
          onblur="formatIncomeInput(this);saveIncome('${key}','side',parseNum(this.value))" />
        <input class="income-input" type="text" placeholder="0"
          value="${extra ? extra.toLocaleString('ko-KR') : ''}"
          onfocus="this.value=this.value.replace(/,/g,'')"
          onblur="formatIncomeInput(this);saveIncome('${key}','extra',parseNum(this.value))" />
        <div class="income-row-total">${total ? fmt(total) : '—'}</div>
      </div>`;
    }).join('');

  // 열별 합계 계산
  let sumSalary = 0, sumSide = 0, sumExtra = 0;
  months.forEach(m => {
    const d = income[`${year}-${m}`] || {};
    sumSalary += d.salary || 0;
    sumSide   += d.side   || 0;
    sumExtra  += d.extra  || 0;
  });

  grid.innerHTML += `
    <div class="income-month-row" style="border-top:2px solid var(--border);margin-top:4px;font-weight:600;">
      <div class="income-month-label" style="color:var(--text);font-weight:600;">합계</div>
      <div class="income-row-total" style="color:#7a6a8a;">${sumSalary ? fmt(sumSalary) : '—'}</div>
      <div class="income-row-total" style="color:#7a6a8a;">${sumSide ? fmt(sumSide) : '—'}</div>
      <div class="income-row-total" style="color:#7a6a8a;">${sumExtra ? fmt(sumExtra) : '—'}</div>
      <div class="income-row-total" style="color:var(--text);font-weight:600;">${yearTotal ? fmt(yearTotal) : '—'}</div>
    </div>`;

  document.getElementById('incomeYearTotal').textContent = yearTotal ? fmt(yearTotal) + ' / 년' : '—';
}

function parseNum(v) { return +v.replace(/,/g,'') || 0; }
function formatIncomeInput(el) {
  const n = parseNum(el.value);
  el.value = n ? n.toLocaleString('ko-KR') : '';
}
function saveIncome(key, field, val) {
  if (!income[key]) income[key] = {};
  income[key][field] = val;
  // 합계 즉시 업데이트
  const d = income[key];
  const total = (d.salary || 0) + (d.side || 0) + (d.extra || 0);
  const row = event.target.closest('.income-month-row');
  if (row) row.querySelector('.income-row-total').textContent = total ? fmt(total) : '—';
  // 연간 합계 재계산
  const year = key.slice(0,4);
  let yearTotal = 0;
  for (let m = 1; m <= 12; m++) {
    const k = year + '-' + String(m).padStart(2,'0');
    const x = income[k] || {};
    yearTotal += (x.salary || 0) + (x.side || 0) + (x.extra || 0);
  }
  document.getElementById('incomeYearTotal').textContent = yearTotal ? fmt(yearTotal) + ' / 년' : '—';
  save();
}

// ── TOGGLE DEPOSIT ──
function toggleDeposit(id) {
  openDepositId = openDepositId === id ? null : id;
  render();
}

// ── UPDATE DEPOSIT FIELD (inline) ──
function updateDeposit(id, key, val) {
  const d = deposits.find(x => x.id === id);
  if (d) d[key] = val;
}

function saveDepositInline(id) {
  save();
  render();
}

function toggleMature(id) {
  const d = deposits.find(x => x.id === id);
  if (d) d.matured = !d.matured;
  save(); render();
}

function deleteDeposit(id) {
  if (!confirm('삭제하시겠습니까?')) return;
  deposits = deposits.filter(x => x.id !== id);
  openDepositId = null;
  save(); render();
}

// ── DEPOSIT MODAL ──
function setPeriod(months) {
  const start = document.getElementById('d-start').value;
  if (!start) { alert('가입일을 먼저 입력하세요'); return; }
  const d = new Date(start);
  d.setMonth(d.getMonth() + months);
  document.getElementById('d-end').value = d.toISOString().slice(0,10);
  // 버튼 active 표시
  document.querySelectorAll('.period-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('pb-' + (months === 12 ? 12 : months === 24 ? 24 : months)).classList.add('active');
}
function clearPeriodBtn() {
  document.querySelectorAll('.period-btn').forEach(b => b.classList.remove('active'));
}
function openDepositModal() {
  document.getElementById('d-name').value = '';
  document.getElementById('d-bank').value = '';
  document.getElementById('d-amount').value = '';
  document.getElementById('d-start').value = new Date().toISOString().slice(0,10);
  document.getElementById('d-end').value = '';
  document.getElementById('d-rate').value = '';
  document.querySelectorAll('.period-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('depositModal').classList.add('open');
}
function closeDepositModal() {
  document.getElementById('depositModal').classList.remove('open');
}
function saveDeposit() {
  const name = document.getElementById('d-name').value.trim();
  if (!name) { alert('이름을 입력하세요'); return; }
  deposits.push({
    id: uid(),
    name,
    bank: document.getElementById('d-bank').value.trim(),
    amount: +document.getElementById('d-amount').value || 0,
    start: document.getElementById('d-start').value,
    end: document.getElementById('d-end').value,
    rate: +document.getElementById('d-rate').value || 0,
    paytype: document.getElementById('d-paytype').value,
    matured: false
  });
  save(); render(); closeDepositModal();
}

// ── STOCK MODAL ──
function openStockModal() {
  document.getElementById('s-name').value = '';
  document.getElementById('s-type').value = 'ETF';
  document.getElementById('s-date').value = new Date().toISOString().slice(0,10);
  document.getElementById('s-amount').value = '';
  document.getElementById('stockModal').classList.add('open');
}
function closeStockModal() {
  document.getElementById('stockModal').classList.remove('open');
}
function saveStock() {
  const name = document.getElementById('s-name').value.trim();
  if (!name) { alert('이름을 입력하세요'); return; }
  const amount = +document.getElementById('s-amount').value || 0;
  const date = document.getElementById('s-date').value;
  stocks.push({
    id: uid(),
    name,
    type: document.getElementById('s-type').value,
    entries: amount > 0 ? [{ id: uid(), date, amount, note: '초기입력' }] : []
  });
  save(); render(); closeStockModal();
}

// ── STOCK ENTRIES ──
function toggleStockEntry(id) {
  const key = id + '_buy';
  editingStockId = editingStockId === key ? null : key;
  render();
  if (editingStockId) {
    document.getElementById('se-date-' + id).value = new Date().toISOString().slice(0,10);
  }
}
function toggleStockEdit(id) {
  const key = id + '_edit';
  editingStockId = editingStockId === key ? null : key;
  render();
}
function saveStockEdit(id) {
  const s = stocks.find(x => x.id === id);
  if (!s) return;
  s.name = document.getElementById('se-name-' + id).value.trim() || s.name;
  s.type = document.getElementById('se-type-' + id).value;
  editingStockId = null;
  save(); render();
}
function toggleStockEdit(id) {
  const key = id + '_edit';
  editingStockId = editingStockId === key ? null : key;
  render();
}
function saveStockEdit(id) {
  const s = stocks.find(x => x.id === id);
  if (!s) return;
  const nameEl = document.getElementById('se-name-' + id);
  const typeEl = document.getElementById('se-type-' + id);
  if (nameEl) s.name = nameEl.value.trim() || s.name;
  if (typeEl) s.type = typeEl.value;
  editingStockId = null;
  save(); render();
}
function toggleStockSell(id) {
  const key = id + '_sell';
  editingStockId = editingStockId === key ? null : key;
  render();
  if (editingStockId) {
    document.getElementById('ss-date-' + id).value = new Date().toISOString().slice(0,10);
  }
}

function addStockEntry(id, sign = 1) {
  const isSell = sign < 0;
  const dateEl = document.getElementById(isSell ? 'ss-date-' + id : 'se-date-' + id);
  const amtEl = document.getElementById(isSell ? 'ss-amt-' + id : 'se-amt-' + id);
  const date = dateEl.value;
  const amount = +amtEl.value;
  if (!amount) { alert('금액을 입력하세요'); return; }
  const s = stocks.find(x => x.id === id);
  if (s) { s.entries = s.entries || []; s.entries.push({ id: uid(), date, amount: amount * sign }); }
  editingStockId = null;
  save(); render();
}

function deleteStockEntry(sid, eid) {
  const s = stocks.find(x => x.id === sid);
  if (s) s.entries = s.entries.filter(e => e.id !== eid);
  save(); render();
}

function deleteStock(id) {
  if (!confirm('계좌를 삭제하시겠습니까?')) return;
  stocks = stocks.filter(x => x.id !== id);
  save(); render();
}

// ── MODAL CLOSE ON OVERLAY ──
document.querySelectorAll('.modal-overlay').forEach(el => {
  el.addEventListener('click', e => { if (e.target === el) el.classList.remove('open'); });
});

// ── INIT ──
render();
</script>
